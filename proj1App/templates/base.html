{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'proj1App/css/style.css' %}">

    <title>{% block title %}EduNotes{% endblock %}</title>
</head>
<body>

    {% block content %}
    <div class="container-fluid d-flex justify-content-center align-items-center" style="min-height:100vh;">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div class="card p-4 p-md-5 shadow">
            <h2 class="text-center mb-4">{% block card_title%}{% endblock %}</h2>
            {% block card_content %}
            {% endblock %}
            </div>
        </div>
    </div>
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'proj1App/js/script.js' %}"></script>
</body>
</html>
